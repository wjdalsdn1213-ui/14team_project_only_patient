<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mini Browser</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="browser">
      <header class="top-bar">
        <div class="left-controls">
          <button type="button">◀</button>
          <button type="button">▶</button>
          <button type="button">⟳</button>
          <input
            type="text"
            class="address-input"
            placeholder="https://example.com"
          />
          <button type="button">이동</button>
        </div>
        <div class="right-controls">
          <button type="button" class="login-btn" id="loginBtn">로그인</button>
          <input type="text" class="auth-input" id="idInput" placeholder="ID" />
          <input
            type="password"
            class="auth-input"
            id="pwInput"
            placeholder="PW"
          />
        </div>
      </header>

      <main class="content">
        <section class="image-slider-section">
          <div class="slider-header">
            <label for="imageUpload" class="upload-label">이미지 붙이기</label>
            <input id="imageUpload" type="file" accept="image/*" multiple />
          </div>

          <div class="slider-frame">
            <button type="button" class="slide-btn" id="prevBtn">‹</button>
            <img
              id="sliderImage"
              class="slider-image"
              src="https://picsum.photos/900/450?random=1"
              alt="슬라이드 이미지"
            />
            <button type="button" class="slide-btn" id="nextBtn">›</button>
          </div>

          <p id="slideStatus" class="slide-status">1 / 3</p>
        </section>

        <section class="bottom-section">
          <section class="news-home-section">
            <h2 class="notice-title">재활의학 뉴스홈</h2>
            <ul class="news-list">
              <li class="news-item">
                <a
                  href="https://www.korea.kr/news/policyNewsView.do?newsId=148922596"
                  target="_blank"
                  rel="noopener noreferrer"
                  class="news-link"
                  >재활의학과 관련 정책 동향 소식 보기</a
                >
              </li>
              <li class="news-item">
                <a
                  href="https://www.khan.co.kr/national/health-welfare/article/202402051050001"
                  target="_blank"
                  rel="noopener noreferrer"
                  class="news-link"
                  >고령사회 재활치료 수요 증가 관련 기사</a
                >
              </li>
              <li class="news-item">
                <a
                  href="https://www.medicaltimes.com/Main/News/NewsView.html?ID=1157499"
                  target="_blank"
                  rel="noopener noreferrer"
                  class="news-link"
                  >근골격계 재활 최신 치료 동향 기사</a
                >
              </li>
              <li class="news-item">
                <a
                  href="https://www.docdocdoc.co.kr/news/articleView.html?idxno=3013116"
                  target="_blank"
                  rel="noopener noreferrer"
                  class="news-link"
                  >지역사회 기반 재활의료 강화 관련 기사</a
                >
              </li>
            </ul>
          </section>

          <section class="notice-board-section">
            <h2 class="notice-title">공지사항 게시판</h2>

            <form id="noticeForm" class="notice-form">
              <input
                id="noticeInput"
                class="notice-input"
                type="text"
                placeholder="공지 제목을 입력하세요."
                maxlength="120"
                required
              />
              <button type="submit" class="notice-add-btn">등록</button>
            </form>

            <ul id="noticeList" class="notice-list">
              <li class="notice-item">
                [공지] 브라우저 메인 화면이 오픈되었습니다.
              </li>
            </ul>
          </section>

          <section class="nearby-map-section">
            <h2 class="notice-title">근처 재활의학과 지도</h2>
            <p id="mapStatus" class="map-status">
              현재 위치를 확인해 주변 병원을 불러오는 중입니다.
            </p>
            <iframe
              id="rehabMapFrame"
              class="rehab-map"
              title="근처 재활의학과 지도"
              loading="lazy"
              referrerpolicy="no-referrer-when-downgrade"
              src="https://www.google.com/maps?q=%EC%9E%AC%ED%99%9C%EC%9D%98%ED%95%99%EA%B3%BC&output=embed"
            ></iframe>
          </section>
        </section>
      </main>
    </div>
    <script src="app.js"></script>
  </body>
</html>
