<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>관리자 화면</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: Arial, sans-serif;
        background: #f2f4f7;
      }

      .panel {
        width: min(560px, 92%);
        border: 1px solid #d9dee5;
        background: #ffffff;
        padding: 24px;
        text-align: center;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 24px;
      }

      p {
        margin: 0 0 16px;
        color: #4b5563;
      }

      a {
        display: inline-block;
        text-decoration: none;
        color: #111827;
        border: 1px solid #cfd6df;
        padding: 8px 12px;
      }
    </style>
  </head>
  <body>
    <section class="panel">
      <h1>로그인 성공</h1>
      <p>관리자 전용 화면으로 이동되었습니다.</p>
      <a href="index.html">메인 화면으로 돌아가기</a>
    </section>
  </body>
</html>
