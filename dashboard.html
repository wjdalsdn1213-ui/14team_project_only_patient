<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>회원 화면</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: Arial, sans-serif;
        background: #f2f4f7;
      }

      .panel {
        width: min(980px, 94%);
        border: 1px solid #d9dee5;
        background: #ffffff;
        padding: 24px;
        text-align: center;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 24px;
      }

      p {
        margin: 0 0 16px;
        color: #4b5563;
      }

      a {
        display: inline-block;
        text-decoration: none;
        color: #111827;
        border: 1px solid #cfd6df;
        padding: 8px 12px;
      }

      .today-workout-box {
        margin: 20px 0;
        padding: 20px;
        border: 1px solid #e5e7eb;
        background: #f8fafc;
        text-align: left;
      }

      .today-workout-title {
        margin: 0 0 12px;
        font-size: 18px;
        color: #111827;
      }

      .workout-card-list {
        margin: 0;
        padding: 0;
        list-style: none;
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 10px;
      }

      .workout-card {
        padding: 12px 10px;
        border: 1px solid #d1d5db;
        border-radius: 12px;
        background: #ffffff;
        color: #1f2937;
        font-size: 14px;
        text-align: center;
        cursor: pointer;
      }

      .workout-card.is-selected {
        border-color: #2563eb;
        background: #eff6ff;
        color: #1d4ed8;
      }

      .workout-timer-box {
        margin-top: 14px;
        padding: 12px;
        border: 1px solid #dbeafe;
        border-radius: 12px;
        background: #ffffff;
      }

      .workout-timer-box.is-hidden {
        display: none;
      }

      .timer-target {
        margin: 0 0 8px;
        font-size: 14px;
        color: #374151;
      }

      .timer-display {
        margin: 0;
        font-size: 28px;
        font-weight: 700;
        letter-spacing: 1px;
        color: #111827;
      }

      .timer-row {
        margin: 0 0 10px;
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .timer-progress {
        flex: 1;
        height: 14px;
        border-radius: 999px;
        background: #e5e7eb;
        overflow: hidden;
      }

      .timer-progress-fill {
        width: 0%;
        height: 100%;
        border-radius: 999px;
        background: #2563eb;
        transition: width 0.3s ease;
      }

      .skip-btn {
        border: 1px solid #cfd6df;
        border-radius: 8px;
        background: #f8fafc;
        color: #111827;
        padding: 8px 12px;
        cursor: pointer;
      }

      .start-btn {
        border: 1px solid #bfdbfe;
        border-radius: 8px;
        background: #2563eb;
        color: #ffffff;
        padding: 8px 12px;
        cursor: pointer;
      }

      .timer-actions {
        display: flex;
        gap: 8px;
        justify-content: flex-end;
      }

      .rehab-calendar-box {
        margin: 20px 0;
        padding: 20px;
        border: 1px solid #e5e7eb;
        background: #f8fafc;
        text-align: left;
      }

      .rehab-calendar-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 12px;
      }

      .calendar-nav {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .calendar-nav-btn {
        border: 1px solid #cfd6df;
        border-radius: 8px;
        background: #ffffff;
        color: #111827;
        padding: 6px 10px;
        cursor: pointer;
      }

      .rehab-calendar-title {
        margin: 0;
        font-size: 18px;
        color: #111827;
      }

      .calendar-month-label {
        margin: 0;
        font-weight: 700;
        color: #1f2937;
      }

      .calendar-grid {
        display: grid;
        grid-template-columns: repeat(7, minmax(0, 1fr));
        gap: 8px;
      }

      .calendar-weekday {
        text-align: center;
        font-size: 13px;
        color: #6b7280;
      }

      .calendar-day {
        min-height: 42px;
        border: 1px solid #d1d5db;
        border-radius: 10px;
        background: #ffffff;
        cursor: pointer;
        font-size: 14px;
        color: #1f2937;
      }

      .calendar-day.is-empty {
        border: none;
        background: transparent;
        cursor: default;
      }

      .calendar-day.is-attended {
        border-color: #2563eb;
        background: #dbeafe;
        color: #1d4ed8;
        font-weight: 700;
      }

      .calendar-day.is-today {
        border-color: #1d4ed8;
        box-shadow: inset 0 0 0 1px #1d4ed8;
      }

      .calendar-day.is-today.is-attended {
        box-shadow: inset 0 0 0 2px #1d4ed8;
      }

      .calendar-help {
        margin: 10px 0 0;
        font-size: 13px;
        color: #4b5563;
      }

      .pose-analysis-box {
        margin: 20px 0 0;
        padding: 20px;
        border: 1px solid #e5e7eb;
        background: #f8fafc;
        text-align: left;
      }

      .pose-analysis-title {
        margin: 0 0 10px;
        font-size: 18px;
        color: #111827;
      }

      .pose-analysis-help {
        margin: 0 0 12px;
        font-size: 13px;
        color: #4b5563;
      }

      .pose-upload-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
        margin-bottom: 12px;
      }

      .pose-file-input {
        max-width: 320px;
      }

      .pose-status {
        margin: 0;
        font-size: 13px;
        color: #374151;
      }

      .pose-viewer {
        position: relative;
        width: 100%;
        max-width: 560px;
        border: 1px solid #d1d5db;
        background: #000000;
        border-radius: 10px;
        overflow: hidden;
      }

      .pose-video {
        width: 100%;
        display: block;
      }

      .pose-canvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }

      .pose-summary {
        margin-top: 12px;
        padding: 12px;
        border: 1px solid #dbeafe;
        border-radius: 10px;
        background: #ffffff;
      }

      .pose-summary.is-hidden {
        display: none;
      }

      .pose-summary-title {
        margin: 0 0 8px;
        font-size: 15px;
        color: #1f2937;
      }

      .pose-summary-list {
        margin: 0;
        padding-left: 18px;
        color: #374151;
        font-size: 14px;
      }

      @media (max-width: 520px) {
        .workout-card-list {
          grid-template-columns: 1fr;
          gap: 8px;
        }

        .calendar-grid {
          gap: 6px;
        }
      }
    </style>
  </head>
  <body>
    <section class="panel">
      <section class="today-workout-box" aria-label="오늘의 운동">
        <h2 class="today-workout-title">오늘의 운동</h2>
        <ul class="workout-card-list">
          <li class="workout-card">웜업 스트레칭</li>
          <li class="workout-card">월 푸쉬업</li>
          <li class="workout-card">쿨 다운 스트레칭</li>
          <li class="workout-card">스쿼트</li>
          <li class="workout-card">써클 암</li>
        </ul>
        <section id="workoutTimerBox" class="workout-timer-box is-hidden" aria-live="polite">
          <p id="timerTarget" class="timer-target"></p>
          <div class="timer-row">
            <p id="timerDisplay" class="timer-display">10:00</p>
            <div class="timer-progress" aria-hidden="true">
              <div id="timerProgressFill" class="timer-progress-fill"></div>
            </div>
          </div>
          <div class="timer-actions">
            <button id="startWorkoutBtn" type="button" class="start-btn">start</button>
            <button id="skipWorkoutBtn" type="button" class="skip-btn">skip</button>
          </div>
        </section>
      </section>
      <section class="rehab-calendar-box" aria-label="재활 캘린더">
        <div class="rehab-calendar-head">
          <h2 class="rehab-calendar-title">재활 캘린더</h2>
          <div class="calendar-nav">
            <button id="prevMonthBtn" type="button" class="calendar-nav-btn">&lt;</button>
            <p id="calendarMonthLabel" class="calendar-month-label"></p>
            <button id="nextMonthBtn" type="button" class="calendar-nav-btn">&gt;</button>
          </div>
        </div>
        <div id="calendarGrid" class="calendar-grid"></div>
        <p class="calendar-help">날짜를 클릭하면 출석 체크/해제가 됩니다.</p>
      </section>
      <section class="pose-analysis-box" aria-label="영상 자세 분석">
        <h2 class="pose-analysis-title">영상 자세 분석</h2>
        <p class="pose-analysis-help">
          스쿼트 등 운동 영상을 올리면 재생 중 랜드마크가 표시되고 종료 후 분석 결과가 요약됩니다.
        </p>
        <div class="pose-upload-row">
          <input
            id="poseVideoInput"
            class="pose-file-input"
            type="file"
            accept="video/*"
          />
          <p id="poseStatus" class="pose-status">영상을 업로드해 주세요.</p>
        </div>
        <div class="pose-viewer">
          <video id="poseVideo" class="pose-video" controls playsinline></video>
          <canvas id="poseCanvas" class="pose-canvas"></canvas>
        </div>
        <section id="poseSummaryBox" class="pose-summary is-hidden" aria-live="polite">
          <h3 class="pose-summary-title">분석 요약</h3>
          <ul id="poseSummaryList" class="pose-summary-list"></ul>
        </section>
      </section>
    </section>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script>
      const workoutCards = document.querySelectorAll(".workout-card");
      const workoutTimerBox = document.getElementById("workoutTimerBox");
      const timerTarget = document.getElementById("timerTarget");
      const timerDisplay = document.getElementById("timerDisplay");
      const timerProgressFill = document.getElementById("timerProgressFill");
      const startWorkoutBtn = document.getElementById("startWorkoutBtn");
      const skipWorkoutBtn = document.getElementById("skipWorkoutBtn");
      const prevMonthBtn = document.getElementById("prevMonthBtn");
      const nextMonthBtn = document.getElementById("nextMonthBtn");
      const calendarMonthLabel = document.getElementById("calendarMonthLabel");
      const calendarGrid = document.getElementById("calendarGrid");
      const poseVideoInput = document.getElementById("poseVideoInput");
      const poseVideo = document.getElementById("poseVideo");
      const poseCanvas = document.getElementById("poseCanvas");
      const poseStatus = document.getElementById("poseStatus");
      const poseSummaryBox = document.getElementById("poseSummaryBox");
      const poseSummaryList = document.getElementById("poseSummaryList");
      const poseCanvasCtx = poseCanvas.getContext("2d");

      const TOTAL_SECONDS = 10 * 60;
      const WEEKDAYS = ["일", "월", "화", "수", "목", "금", "토"];
      const ATTENDANCE_STORAGE_KEY = "rehabAttendanceByMonth";
      const KNEE_VISIBILITY_THRESHOLD = 0.45;
      let selectedWorkoutCard = null;
      let timerId = null;
      let remainingSeconds = TOTAL_SECONDS;
      let isRunning = false;
      let currentCalendarDate = new Date();
      const attendanceByMonth = {};
      let pose = null;
      let poseObjectUrl = "";
      let animationFrameId = null;
      let isPoseFrameProcessing = false;
      let squatState = "up";
      const poseStats = {
        totalFrames: 0,
        detectedFrames: 0,
        squatCount: 0,
        minKneeAngle: 180,
        maxKneeAngle: 0,
      };

      function resetPoseStats() {
        poseStats.totalFrames = 0;
        poseStats.detectedFrames = 0;
        poseStats.squatCount = 0;
        poseStats.minKneeAngle = 180;
        poseStats.maxKneeAngle = 0;
        squatState = "up";
      }

      function toScreenPoint(point) {
        return {
          x: point.x * poseCanvas.width,
          y: point.y * poseCanvas.height,
        };
      }

      function calculateAngle(pointA, pointB, pointC) {
        const abx = pointA.x - pointB.x;
        const aby = pointA.y - pointB.y;
        const cbx = pointC.x - pointB.x;
        const cby = pointC.y - pointB.y;
        const dot = abx * cbx + aby * cby;
        const abLength = Math.hypot(abx, aby);
        const cbLength = Math.hypot(cbx, cby);
        if (abLength === 0 || cbLength === 0) return 180;
        const cosine = Math.min(1, Math.max(-1, dot / (abLength * cbLength)));
        return (Math.acos(cosine) * 180) / Math.PI;
      }

      function getAverageKneeAngle(landmarks) {
        const leftHip = landmarks[23];
        const leftKnee = landmarks[25];
        const leftAnkle = landmarks[27];
        const rightHip = landmarks[24];
        const rightKnee = landmarks[26];
        const rightAnkle = landmarks[28];

        const leftVisible =
          leftHip.visibility > KNEE_VISIBILITY_THRESHOLD &&
          leftKnee.visibility > KNEE_VISIBILITY_THRESHOLD &&
          leftAnkle.visibility > KNEE_VISIBILITY_THRESHOLD;
        const rightVisible =
          rightHip.visibility > KNEE_VISIBILITY_THRESHOLD &&
          rightKnee.visibility > KNEE_VISIBILITY_THRESHOLD &&
          rightAnkle.visibility > KNEE_VISIBILITY_THRESHOLD;

        if (!leftVisible && !rightVisible) {
          return null;
        }

        let total = 0;
        let count = 0;
        if (leftVisible) {
          const leftAngle = calculateAngle(
            toScreenPoint(leftHip),
            toScreenPoint(leftKnee),
            toScreenPoint(leftAnkle)
          );
          total += leftAngle;
          count += 1;
        }
        if (rightVisible) {
          const rightAngle = calculateAngle(
            toScreenPoint(rightHip),
            toScreenPoint(rightKnee),
            toScreenPoint(rightAnkle)
          );
          total += rightAngle;
          count += 1;
        }
        return count > 0 ? total / count : null;
      }

      function updateSquatCounter(avgKneeAngle) {
        if (avgKneeAngle === null) return;
        poseStats.minKneeAngle = Math.min(poseStats.minKneeAngle, avgKneeAngle);
        poseStats.maxKneeAngle = Math.max(poseStats.maxKneeAngle, avgKneeAngle);

        if (squatState === "up" && avgKneeAngle < 100) {
          squatState = "down";
          return;
        }
        if (squatState === "down" && avgKneeAngle > 155) {
          squatState = "up";
          poseStats.squatCount += 1;
        }
      }

      function renderPoseSummary() {
        const detectionRate =
          poseStats.totalFrames === 0
            ? 0
            : (poseStats.detectedFrames / poseStats.totalFrames) * 100;
        const hasAngleData = poseStats.detectedFrames > 0;
        const kneeRange = hasAngleData ? poseStats.maxKneeAngle - poseStats.minKneeAngle : 0;
        const minAngleText =
          hasAngleData ? `${poseStats.minKneeAngle.toFixed(1)}도` : "데이터 없음";
        const maxAngleText =
          hasAngleData ? `${poseStats.maxKneeAngle.toFixed(1)}도` : "데이터 없음";

        function getPostureGrade() {
          if (!hasAngleData || detectionRate < 45) {
            return "주의 (데이터 부족)";
          }

          if (
            detectionRate >= 75 &&
            poseStats.minKneeAngle <= 105 &&
            kneeRange >= 45
          ) {
            return "우수";
          }

          if (
            detectionRate >= 60 &&
            poseStats.minKneeAngle <= 125 &&
            kneeRange >= 30
          ) {
            return "보통";
          }

          return "주의";
        }

        const postureGrade = getPostureGrade();

        poseSummaryList.innerHTML = `
          <li>추정 스쿼트 횟수: ${poseStats.squatCount}회</li>
          <li>최저 무릎 각도: ${minAngleText}</li>
          <li>최고 무릎 각도: ${maxAngleText}</li>
          <li>랜드마크 감지율: ${detectionRate.toFixed(1)}%</li>
          <li>자세 정확도 등급: ${postureGrade}</li>
        `;
        poseSummaryBox.classList.remove("is-hidden");
      }

      function clearPoseCanvas() {
        poseCanvasCtx.clearRect(0, 0, poseCanvas.width, poseCanvas.height);
      }

      function stopPoseLoop() {
        if (animationFrameId !== null) {
          cancelAnimationFrame(animationFrameId);
          animationFrameId = null;
        }
        isPoseFrameProcessing = false;
      }

      function resizePoseCanvas() {
        const width = poseVideo.videoWidth || poseVideo.clientWidth;
        const height = poseVideo.videoHeight || poseVideo.clientHeight;
        if (!width || !height) return;
        poseCanvas.width = width;
        poseCanvas.height = height;
      }

      async function processPoseFrame() {
        if (!pose || poseVideo.paused || poseVideo.ended) return;

        if (isPoseFrameProcessing) {
          animationFrameId = requestAnimationFrame(processPoseFrame);
          return;
        }

        isPoseFrameProcessing = true;
        try {
          await pose.send({ image: poseVideo });
        } catch (error) {
          poseStatus.textContent = "랜드마크 분석 중 오류가 발생했습니다.";
          stopPoseLoop();
        } finally {
          isPoseFrameProcessing = false;
        }

        if (!poseVideo.paused && !poseVideo.ended) {
          animationFrameId = requestAnimationFrame(processPoseFrame);
        }
      }

      function setPoseStatus(text) {
        poseStatus.textContent = text;
      }

      async function initializePose() {
        if (pose) return pose;
        pose = new window.Pose({
          locateFile: (file) =>
            `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`,
        });
        pose.setOptions({
          modelComplexity: 1,
          smoothLandmarks: true,
          enableSegmentation: false,
          minDetectionConfidence: 0.55,
          minTrackingConfidence: 0.55,
        });
        pose.onResults((results) => {
          clearPoseCanvas();
          poseStats.totalFrames += 1;
          if (!results.poseLandmarks) return;

          poseStats.detectedFrames += 1;
          window.drawConnectors(
            poseCanvasCtx,
            results.poseLandmarks,
            window.POSE_CONNECTIONS,
            { color: "#00e5ff", lineWidth: 3 }
          );
          window.drawLandmarks(poseCanvasCtx, results.poseLandmarks, {
            color: "#22c55e",
            lineWidth: 1,
            radius: 4,
          });
          const avgKneeAngle = getAverageKneeAngle(results.poseLandmarks);
          updateSquatCounter(avgKneeAngle);
        });
        return pose;
      }

      function formatTime(seconds) {
        const minute = String(Math.floor(seconds / 60)).padStart(2, "0");
        const second = String(seconds % 60).padStart(2, "0");
        return `${minute}:${second}`;
      }

      function stopTimer() {
        if (timerId !== null) {
          clearInterval(timerId);
          timerId = null;
        }
        isRunning = false;
        startWorkoutBtn.textContent = "start";
      }

      function updateProgressBar() {
        const elapsedSeconds = TOTAL_SECONDS - remainingSeconds;
        const progress = (elapsedSeconds / TOTAL_SECONDS) * 100;
        timerProgressFill.style.width = `${Math.max(0, Math.min(100, progress))}%`;
      }

      function resetSelection() {
        stopTimer();
        if (selectedWorkoutCard) {
          selectedWorkoutCard.classList.remove("is-selected");
          selectedWorkoutCard = null;
        }
        workoutTimerBox.classList.add("is-hidden");
        timerTarget.textContent = "";
        timerDisplay.textContent = formatTime(TOTAL_SECONDS);
        timerProgressFill.style.width = "0%";
        startWorkoutBtn.textContent = "start";
      }

      function startWorkoutTimer() {
        stopTimer();
        isRunning = true;
        startWorkoutBtn.textContent = "pause";
        timerId = setInterval(() => {
          remainingSeconds -= 1;
          timerDisplay.textContent = formatTime(remainingSeconds);
          updateProgressBar();

          if (remainingSeconds <= 0) {
            stopTimer();
            remainingSeconds = 0;
            timerDisplay.textContent = formatTime(remainingSeconds);
            timerProgressFill.style.width = "100%";
            timerTarget.textContent = `${selectedWorkoutCard.textContent} 완료`;
          }
        }, 1000);
      }

      function selectWorkout(card) {
        if (selectedWorkoutCard === card) {
          resetSelection();
          return;
        }

        if (selectedWorkoutCard) {
          selectedWorkoutCard.classList.remove("is-selected");
        }

        selectedWorkoutCard = card;
        selectedWorkoutCard.classList.add("is-selected");
        remainingSeconds = TOTAL_SECONDS;
        timerTarget.textContent = `${selectedWorkoutCard.textContent} 준비 완료`;
        timerDisplay.textContent = formatTime(remainingSeconds);
        timerProgressFill.style.width = "0%";
        startWorkoutBtn.textContent = "start";
        workoutTimerBox.classList.remove("is-hidden");
      }

      workoutCards.forEach((card) => {
        card.addEventListener("click", () => selectWorkout(card));
      });

      skipWorkoutBtn.addEventListener("click", () => {
        if (!selectedWorkoutCard) return;
        resetSelection();
      });

      startWorkoutBtn.addEventListener("click", () => {
        if (!selectedWorkoutCard) return;
        if (remainingSeconds <= 0) return;

        if (isRunning) {
          stopTimer();
          timerTarget.textContent = `${selectedWorkoutCard.textContent} 일시정지`;
          return;
        }

        timerTarget.textContent = `${selectedWorkoutCard.textContent} 진행 중`;
        startWorkoutTimer();
      });

      function getMonthKey(date) {
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, "0");
        return `${year}-${month}`;
      }

      function getAttendanceSet(monthKey) {
        if (!attendanceByMonth[monthKey]) {
          attendanceByMonth[monthKey] = new Set();
        }
        return attendanceByMonth[monthKey];
      }

      function saveAttendanceToStorage() {
        const serialized = {};
        Object.entries(attendanceByMonth).forEach(([monthKey, daySet]) => {
          serialized[monthKey] = [...daySet];
        });
        localStorage.setItem(ATTENDANCE_STORAGE_KEY, JSON.stringify(serialized));
      }

      function loadAttendanceFromStorage() {
        const raw = localStorage.getItem(ATTENDANCE_STORAGE_KEY);
        if (!raw) return;

        try {
          const parsed = JSON.parse(raw);
          Object.entries(parsed).forEach(([monthKey, dayList]) => {
            if (!Array.isArray(dayList)) return;
            attendanceByMonth[monthKey] = new Set(
              dayList
                .map((day) => Number(day))
                .filter((day) => Number.isInteger(day) && day > 0 && day <= 31)
            );
          });
        } catch (error) {
          localStorage.removeItem(ATTENDANCE_STORAGE_KEY);
        }
      }

      function renderCalendar(date) {
        const year = date.getFullYear();
        const month = date.getMonth();
        const monthKey = getMonthKey(date);
        const attendanceSet = getAttendanceSet(monthKey);
        const today = new Date();
        const isCurrentMonth =
          today.getFullYear() === year && today.getMonth() === month;
        const firstDay = new Date(year, month, 1).getDay();
        const lastDate = new Date(year, month + 1, 0).getDate();

        calendarMonthLabel.textContent = `${year}년 ${month + 1}월`;
        calendarGrid.innerHTML = "";

        WEEKDAYS.forEach((weekday) => {
          const weekdayCell = document.createElement("div");
          weekdayCell.className = "calendar-weekday";
          weekdayCell.textContent = weekday;
          calendarGrid.appendChild(weekdayCell);
        });

        for (let i = 0; i < firstDay; i += 1) {
          const emptyCell = document.createElement("button");
          emptyCell.type = "button";
          emptyCell.className = "calendar-day is-empty";
          emptyCell.disabled = true;
          calendarGrid.appendChild(emptyCell);
        }

        for (let day = 1; day <= lastDate; day += 1) {
          const dayCell = document.createElement("button");
          dayCell.type = "button";
          dayCell.className = "calendar-day";
          dayCell.textContent = String(day);

          if (isCurrentMonth && today.getDate() === day) {
            dayCell.classList.add("is-today");
          }

          if (attendanceSet.has(day)) {
            dayCell.classList.add("is-attended");
          }

          dayCell.addEventListener("click", () => {
            if (attendanceSet.has(day)) {
              attendanceSet.delete(day);
              dayCell.classList.remove("is-attended");
              saveAttendanceToStorage();
              return;
            }
            attendanceSet.add(day);
            dayCell.classList.add("is-attended");
            saveAttendanceToStorage();
          });

          calendarGrid.appendChild(dayCell);
        }
      }

      prevMonthBtn.addEventListener("click", () => {
        currentCalendarDate = new Date(
          currentCalendarDate.getFullYear(),
          currentCalendarDate.getMonth() - 1,
          1
        );
        renderCalendar(currentCalendarDate);
      });

      nextMonthBtn.addEventListener("click", () => {
        currentCalendarDate = new Date(
          currentCalendarDate.getFullYear(),
          currentCalendarDate.getMonth() + 1,
          1
        );
        renderCalendar(currentCalendarDate);
      });

      poseVideoInput.addEventListener("change", async (event) => {
        const file = event.target.files && event.target.files[0];
        if (!file) return;

        stopPoseLoop();
        clearPoseCanvas();
        poseSummaryBox.classList.add("is-hidden");
        poseSummaryList.innerHTML = "";
        resetPoseStats();

        if (poseObjectUrl) {
          URL.revokeObjectURL(poseObjectUrl);
          poseObjectUrl = "";
        }

        poseObjectUrl = URL.createObjectURL(file);
        poseVideo.src = poseObjectUrl;
        setPoseStatus("영상 로드 중입니다...");

        try {
          await initializePose();
        } catch (error) {
          setPoseStatus("분석 엔진 초기화에 실패했습니다.");
        }
      });

      poseVideo.addEventListener("loadedmetadata", () => {
        resizePoseCanvas();
        setPoseStatus("재생하면 랜드마크 분석이 시작됩니다.");
      });

      poseVideo.addEventListener("play", () => {
        resetPoseStats();
        poseSummaryBox.classList.add("is-hidden");
        poseSummaryList.innerHTML = "";
        resizePoseCanvas();
        setPoseStatus("영상 재생 중... 랜드마크 분석 중입니다.");
        stopPoseLoop();
        animationFrameId = requestAnimationFrame(processPoseFrame);
      });

      poseVideo.addEventListener("pause", () => {
        if (poseVideo.ended) return;
        stopPoseLoop();
        setPoseStatus("일시정지됨. 다시 재생하면 분석을 이어갑니다.");
      });

      poseVideo.addEventListener("ended", () => {
        stopPoseLoop();
        setPoseStatus("영상 분석이 완료되었습니다.");
        renderPoseSummary();
      });

      loadAttendanceFromStorage();
      renderCalendar(currentCalendarDate);
    </script>
  </body>
</html>
